{% extends 'base.html' %}
{% block content %}
<h2 style="text-align:center;">Order Confirmed!</h2>
<div style="max-width: 600px; margin:auto; text-align: center;">
    <p>Thank you <strong>{{ name }}</strong> for ordering food.</p>
    <p>Your seat number is <strong>{{ seat }}</strong>.</p>
    <p>Your token number is: <strong>#{{ token }}</strong></p>
    <p>Please wait while we deliver your food to your seat.</p>
</div>
{% endblock %}
