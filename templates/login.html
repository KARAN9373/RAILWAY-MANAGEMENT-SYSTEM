{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<style>
  body {
    background: none;
    font-family: 'Orbitron', sans-serif;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  .video-bg {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  .login-wrapper {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .neon-box {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
    animation: fadeIn 1.2s ease-out;
  }

  .neon-box h2 {
    color: #00f0ff;
    text-shadow: 0 0 10px #00f0ff;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  label {
    color: #e0e0e0;
    font-size: 0.9rem;
  }

  input {
    background-color: transparent;
    border: 2px solid #00f0ff;
    border-radius: 10px;
    color: #fff;
    padding: 10px;
    width: 100%;
    transition: 0.3s;
  }

  input:focus {
    outline: none;
    border-color: #ffffff;
    box-shadow: 0 0 10px #00f0ff;
  }

  .neon-btn {
    background-color: #00f0ff;
    border: none;
    color: #000;
    font-weight: 600;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 15px #00f0ff;
    transition: 0.3s;
  }

  .neon-btn:hover {
    background-color: #fff;
    color: #00f0ff;
    box-shadow: 0 0 25px #00f0ff;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .alert {
    margin-top: 1rem;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    font-size: 0.9rem;
  }
</style>

<!-- 🎥 Background Video -->
<video class="video-bg" autoplay muted loop>
  <source src="{{ url_for('static', filename='videos/train_login_bg.mp4') }}" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="login-wrapper">
  <div class="neon-box">
    <h2>🚄 Railway Login</h2>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" required>
      </div>
      <div class="mb-4 mt-3">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
      </div>
      <button type="submit" class="neon-btn mt-2">🔐 Log In</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>
</div>
{% endblock %}
